services:
  db:
    image: postgres:15-alpine
    container_name: osint_postgres
    restart: always
    environment:
      POSTGRES_USER: thehaohcm
      POSTGRES_PASSWORD: ngotrungtinh
      POSTGRES_DB: thehaohcm_trading_signal_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thehaohcm -d thehaohcm_trading_signal_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build: .
    container_name: osint_worker
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    stdin_open: true
    tty: true

  api:
    build:
      context: ./trading_api
      dockerfile: Dockerfile
    container_name: osint_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=thehaohcm
      - DB_PASSWORD=ngotrungtinh
      - DB_NAME=thehaohcm_trading_signal_db
    env_file:
      - ./trading_api/.env

volumes:
  postgres_data:
